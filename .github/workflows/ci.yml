name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scan tracked files for secrets
        run: npm run security:secrets

      - name: Verify commercial-readiness controls
        run: npm run security:commercial

      - name: Run ESLint
        run: npm run lint:ci
        continue-on-error: false

      - name: Check TypeScript
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Build application
        run: npm run build

  functions:
    name: Build Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: ./functions
        run: npm ci

      - name: Run ESLint (functions)
        working-directory: ./functions
        run: npm run lint
        continue-on-error: false

      - name: Build functions
        working-directory: ./functions
        run: npm run build
